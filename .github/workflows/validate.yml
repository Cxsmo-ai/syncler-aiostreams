name: Validate Syncler package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * *"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Contract, security, and live smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run deterministic tests
        run: npm test

      - name: Smoke-test Midnight nightly
        run: npm run smoke:live

      - name: Upload install artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syncler-aiostreams-package-json
          path: |
            vendor.json
            manifest.github.json
            express.github.json
          if-no-files-found: error
